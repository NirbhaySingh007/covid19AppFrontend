<section class="vh-100 gradient-custom">
  <section class="p-3" *ngFor="let country of wishList">
    <div class="container">
        <div class="row">
            <div class="col">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h2>
                            country name : {{country.country}}

                        </h2>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                Country- {{country.country}}
                            </div>
                            <div class="col-md-9">
                                <h4 class="display-1 text-primary">
                                    Covid data : {{country.coviddata?.infected}}
                                </h4>
                                <p>
                                    Infected: {{country.coviddata?.infected}}&#8451;,  Tested:
                                    {{country.coviddata?.tested}},  Recovered: {{country.coviddata?.recovered}},
                                    Deceased: {{country.coviddata?.deceased}}
                                </p>

                            </div>
                        </div>

                    </div>
                    <div class="d-flex">
                        <button class="btn btn-danger" (click)="remove(country)">Remove from favourite list</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

</section>

<html>
  <body>
<section class="vh-100 bg-image">
  <div class="mask d-flex align-items-center h-100 gradient-custom-3">
    <div class="container h-100">
      <div class="row d-flex justify-content-center align-items-center h-100">
        <div class="col-12 col-md-9 col-lg-7 col-xl-6">
          <div class="card" style="border-radius: 15px;">
            <div class="card-body p-5">
              <h2 class="text-uppercase text-center mb-5">Register for new account</h2>

              <form [formGroup]="myform" (ngSubmit)="register()">

                <h5 class="fw-normal mb-3 pb-3" style="letter-spacing: 1px; text-align: center;">Registration Form
                </h5>
                
                <div class="form-outline mb-4">
                  <input type="number" id="form2Example17" placeholder="UserId"
                    class="form-control form-control-lg" formControlName="id" />
                </div>

                <div class="form-outline mb-4">
                  <input type="text" id="form2Example17" placeholder="Username"
                    class="form-control form-control-lg" formControlName="username" />
                </div>
                
                <div class="form-outline mb-4">
                  <input type="email" id="form2Example17" placeholder="Email"
                    class="form-control form-control-lg" formControlName="email" />
                </div>

                <div class="form-outline mb-4">
                  <input type="password" id="form2Example27" placeholder="Password"
                    class="form-control form-control-lg" formControlName="password" />
                </div>

                <div class="pt-1 mb-4">
                  <button class="btn btn-dark btn-lg btn-block" type="submit">Register</button>
                </div>


                <p class="mb-5 pb-lg-2" style="color: #393f81;">Already have an account? <button routerLink="/logout"
                    style="color: #393f81;">login</button></p>

              </form>
               
            </div>
          </div>
        </div>
        </div>
      </div>
    </div>
</section>
</body>
</html>

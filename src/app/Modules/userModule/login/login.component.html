<html>
  <body>
<section class="vh-100 gradient-custom-3">

  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col-12 col-md-8 col-lg-6 col-xl-5">
          <div class="img">
          <div class="card-body p-5 text-center">
        
          <form [formGroup]="formGroup" (ngSubmit)="islogin()">
            <div class="mb-md-5 mt-md-4 pb-5">

              <h2 class="fw-bold mb-2 text-uppercase" >Login</h2>
              <p class="text-white-50 mb-5"><p style="color: black;"><b>Enter username and password!</b></p>
               
              <div class="form-outline  mb-4">
                <input type="text" id="typeEmailX" class="form-control form-control-lg"  formControlName="username" placeholder="Username" />
            
              </div>

              <div class="form-outline mb-4">
                <input type="password" id="typePasswordX" class="form-control form-control-lg" formControlName="password" placeholder="Password" />
              </div>
              <button class="btn btn-outline-light btn-lg px-5" style="color:rgba(0, 0, 0, 0.989) ;" type="submit"><b>Login</b></button>
            </div>
          </form>
            <div>
              <p class="mb-0"><p style="color: rgb(0, 0, 0);"><b>New User ? </b><button (click)="register()" class="btn btn-outline-light btn-lg px-5" style="color: rgb(0, 0, 0);"><b>Sign Up</b></button>
              </p>
            </div>
          </div>
          </div>
      </div>
    </div>
  </div>

</section>
</body>
</html>
